# ============================================================================
# Ultraclaw — Cross-Platform Release Pipeline
# ============================================================================
# Triggered on version tag push (v*.*.*)
# Builds .exe (Windows), .deb (Linux), .dmg (macOS)
# Uploads all artifacts to a GitHub Release.
# ============================================================================

name: Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  # ==========================================================================
  # WINDOWS — .exe
  # ==========================================================================
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultraclaw-windows
          path: target/release/ultraclaw.exe

  # ==========================================================================
  # LINUX — .deb
  # ==========================================================================
  build-linux:
    name: Build Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build .deb package
        run: cargo deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultraclaw-linux
          path: target/debian/*.deb

  # ==========================================================================
  # MACOS — .dmg
  # ==========================================================================
  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build .app bundle
        run: cargo bundle --release

      - name: Create .dmg
        run: |
          APP_PATH="target/release/bundle/osx/Ultraclaw.app"
          DMG_TMP=$(mktemp -d)
          cp -r "$APP_PATH" "$DMG_TMP/"
          ln -s /Applications "$DMG_TMP/Applications"
          hdiutil create -volname "Ultraclaw" \
            -srcfolder "$DMG_TMP" \
            -ov -format UDZO \
            "ultraclaw.dmg"
          rm -rf "$DMG_TMP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultraclaw-macos
          path: ultraclaw.dmg

  # ==========================================================================
  # CREATE GITHUB RELEASE
  # ==========================================================================
  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ultraclaw-windows/ultraclaw.exe
            artifacts/ultraclaw-linux/*.deb
            artifacts/ultraclaw-macos/ultraclaw.dmg
